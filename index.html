<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check In</title>
<style>
  :root {
    --accent: #2563eb;
    --accent-dark: #1d4ed8;
    --success: #16a34a;
    --error: #dc2626;
    --text: #1e293b;
    --muted: #64748b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 20px;
  }
  .card {
    background: #ffffff;
    border-radius: 16px;
    padding: 40px 32px;
    max-width: 380px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  h1 {
    font-size: 1.4rem;
    margin: 0 0 8px;
    color: var(--text);
  }
  button#checkinBtn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 16px 32px;
    font-size: 1.05rem;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    transition: background 0.2s ease;
  }
  button#checkinBtn:hover { background: var(--accent-dark); }
  button#checkinBtn:disabled {
    background: #94a3b8;
    cursor: not-allowed;
  }
  .status {
    margin-top: 22px;
    font-size: 0.9rem;
    min-height: 20px;
    color: var(--muted);
  }
  .status.error { color: var(--error); font-weight: 600; }
  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(37,99,235,0.25);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .checkmark {
    font-size: 2.4rem;
    color: var(--success);
    margin-bottom: 6px;
  }
</style>
</head>
<body>

<div class="card">
  <div id="preState">
    <button id="checkinBtn" onclick="doCheckIn()">Check In</button>
  </div>

  <div id="postState" style="display:none;">
    <div class="checkmark" id="resultIcon">✓</div>
    <h1 id="resultTitle">Checked In</h1>
  </div>

  <div class="status" id="statusMsg"></div>
</div>

<script>
// ⚠️ REPLACE THIS with your Google Apps Script Web App URL
const ENDPOINT_URL = "https://script.google.com/macros/s/AKfycbxcAVME5QcCW6n-1aDbxFLpWN1tbkLxB-y9YXU1UejWP51Su-kxaf_KGS4FBUY9xiLzTg/exec";
const STORAGE_KEY = "checkin_done_v1";

// Lock the page immediately if this device has already checked in
window.addEventListener('DOMContentLoaded', function () {
  if (localStorage.getItem(STORAGE_KEY)) {
    showResult(true, 'Already Checked In');
  }
});

function setStatus(html, cls) {
  const el = document.getElementById('statusMsg');
  el.innerHTML = html;
  el.className = 'status' + (cls ? ' ' + cls : '');
}

function showResult(success, title) {
  document.getElementById('preState').style.display = 'none';
  document.getElementById('postState').style.display = 'block';
  document.getElementById('resultIcon').textContent = success ? '✓' : '✕';
  document.getElementById('resultIcon').style.color = success ? '#16a34a' : '#dc2626';
  document.getElementById('resultTitle').textContent = title;
}

function resetToButton() {
  document.getElementById('checkinBtn').disabled = false;
  document.getElementById('preState').style.display = 'block';
  document.getElementById('postState').style.display = 'none';
}

function doCheckIn() {
  if (localStorage.getItem(STORAGE_KEY)) {
    showResult(true, 'Already Checked In');
    return;
  }

  const btn = document.getElementById('checkinBtn');
  btn.disabled = true;
  setStatus('<span class="spinner"></span>Getting your location…');

  // Always fetch approximate IP-based location alongside GPS
  const ipLocationPromise = fetch('https://ipapi.co/json/')
    .then(function (res) { return res.json(); })
    .catch(function () { return null; });

  if (!navigator.geolocation) {
    ipLocationPromise.then(function (ipData) {
      submitData({
        gps_latitude: '',
        gps_longitude: '',
        gps_accuracy_meters: '',
        ip_latitude: ipData ? (ipData.latitude || '') : '',
        ip_longitude: ipData ? (ipData.longitude || '') : '',
        ip_city: ipData ? (ipData.city || '') : ''
      });
    });
    return;
  }

  navigator.geolocation.getCurrentPosition(
    function (position) {
      ipLocationPromise.then(function (ipData) {
        submitData({
          gps_latitude: position.coords.latitude,
          gps_longitude: position.coords.longitude,
          gps_accuracy_meters: position.coords.accuracy,
          ip_latitude: ipData ? (ipData.latitude || '') : '',
          ip_longitude: ipData ? (ipData.longitude || '') : '',
          ip_city: ipData ? (ipData.city || '') : ''
        });
      });
    },
    function (err) {
      // GPS denied/unavailable — fall back to IP-only
      ipLocationPromise.then(function (ipData) {
        if (!ipData) {
          setStatus('Could not get your location. Please allow location access and try again.', 'error');
          resetToButton();
          return;
        }
        submitData({
          gps_latitude: '',
          gps_longitude: '',
          gps_accuracy_meters: '',
          ip_latitude: ipData.latitude || '',
          ip_longitude: ipData.longitude || '',
          ip_city: ipData.city || ''
        });
      });
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
  );
}

function submitData(payload) {
  setStatus('<span class="spinner"></span>Submitting…');
  payload.timestamp = new Date().toISOString();

  fetch(ENDPOINT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // avoids CORS preflight for Apps Script
    body: JSON.stringify(payload)
  })
  .then(function () {
    localStorage.setItem(STORAGE_KEY, '1');
    setStatus('');
    showResult(true, 'Checked In');
  })
  .catch(function () {
    setStatus('');
    showResult(false, 'Submission Failed');
    resetToButton();
  });
}
</script>

</body>
</html>
